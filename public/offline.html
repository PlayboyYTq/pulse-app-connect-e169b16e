<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Circle — You're offline</title>
    <meta name="theme-color" content="#3B82F6" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 0%, rgba(59,130,246,0.35), transparent 40%),
          radial-gradient(circle at 80% 100%, rgba(99,102,241,0.25), transparent 45%),
          #0F172A;
        color: #F8FAFC;
        display: grid;
        place-items: center;
        padding: 24px;
        min-height: 100dvh;
      }
      .card {
        max-width: 440px;
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 36px 28px;
        text-align: center;
        box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
      }
      .logo {
        width: 88px; height: 88px; border-radius: 24px;
        background: linear-gradient(135deg, #3B82F6, #6366F1);
        display: grid; place-items: center;
        margin: 0 auto 20px;
        box-shadow: 0 16px 40px -12px rgba(59,130,246,0.6);
      }
      .logo svg { width: 44px; height: 44px; color: white; }
      h1 { font-size: 26px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.02em; }
      p { color: #94A3B8; font-size: 15px; line-height: 1.55; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: linear-gradient(135deg, #3B82F6, #6366F1);
        color: white; font-weight: 600; font-size: 15px;
        padding: 14px 24px; border-radius: 14px; width: 100%;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 10px 24px -10px rgba(59,130,246,0.6);
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -10px rgba(59,130,246,0.7); }
      .status { margin-top: 18px; font-size: 13px; color: #64748B; }
      .dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: #EF4444; margin-right: 6px; vertical-align: middle;
      }
      .dot.online { background: #10B981; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Circle can't reach the server right now. Check your connection — your messages will sync as soon as you're back online.</p>
      <button onclick="location.reload()">Try again</button>
      <div class="status"><span id="dot" class="dot"></span><span id="state">Offline</span></div>
    </div>
    <script>
      const dot = document.getElementById("dot");
      const state = document.getElementById("state");
      function update() {
        if (navigator.onLine) {
          dot.classList.add("online");
          state.textContent = "Back online — refreshing…";
          setTimeout(() => location.reload(), 800);
        } else {
          dot.classList.remove("online");
          state.textContent = "Offline";
        }
      }
      window.addEventListener("online", update);
      window.addEventListener("offline", update);
      update();
    </script>
  </body>
</html>
